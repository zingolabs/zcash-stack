    namespace: ""  # empty = same namespace as zaino
    name: zebra
  # Logging configuration (requires improved-logging branch)
  logging:
    # Format: stream (default), tree (hierarchical), json (for Loki/ELK)
    format: ""
    # Color output: true, false, auto
    color: ""
    # Log level filter (standard RUST_LOG format)
    level: ""
  # Additional environment variables passed to the zaino container
  extraEnv: []
  # Example:
  #   - name: OTEL_EXPORTER_OTLP_ENDPOINT
  #     value: http://tempo.monitoring.svc.cluster.local:4317
  ingress:
    enabled: true
    domains: []
  image:
    repository: emersonian/zcash-zaino
    tag: 0.1.2-zr4
